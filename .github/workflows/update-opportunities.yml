name: Mise à jour opportunités foncières

on:
  schedule:
    # Tous les lundis à 6h00 EST (11h00 UTC)
    - cron: '0 11 * * 1'
  workflow_dispatch:   # Déclenchement manuel possible

jobs:
  update-opportunities:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          pip install requests pandas shapely

      - name: Exécuter l'analyse foncière
        run: |
          python opportunites_foncieres.py

      - name: Vérifier la sortie
        run: |
          if [ -f "opportunities.json" ]; then
            echo "✅ opportunities.json généré"
            python -c "
          import json
          with open('opportunities.json') as f:
              data = json.load(f)
          count = len(data) if isinstance(data, list) else data.get('total', 0)
          print(f'   {count} opportunités détectées')
          "
          else
            echo "❌ opportunities.json non trouvé"
            exit 1
          fi

      - name: Commit et push
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add opportunities.json
          git diff --cached --quiet || git commit -m "🏗️ Mise à jour opportunités foncières — $(date '+%Y-%m-%d')"
          git push
